<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 9 - Sound and Vision Demo</title>
  <link rel="stylesheet" href="styles.css">
  <script src="sound-vision.js" defer></script>
</head>
<body>
  <header>
    <h1>Combined Sound and Vision Demo</h1>
    <p>This page links audio synthesis to animated canvas circles, creating a simple interactive sound-visualiser style demo.</p>
  </header>

  <main>
    <section class="card">
      <div class="button-row">
        <button type="button" id="pulse-button">Play Pulse</button>
        <button type="button" id="random-button">Play Random Note</button>
        <button type="button" id="clear-visuals-button">Clear Visuals</button>
      </div>
      <canvas id="vision-canvas" width="640" height="320"></canvas>
      <div id="sound-vision-status" class="output"></div>
    </section>

    <section class="card">
      <p><a href="index.html">Back to Unit 9 index</a></p>
    </section>
  </main>
</body>
</html>
