<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 8 - JSON</title>
  <link rel="stylesheet" href="styles.css">
  <script src="json.js" defer></script>
</head>
<body>
  <header>
    <h1>JSON Data Representation</h1>
    <p>This example shows how a JSON string can be parsed into a JavaScript object and then converted back into JSON text.</p>
  </header>

  <main>
    <section class="card">
      <h2>JSON Example</h2>
      <div class="button-row">
        <button type="button" id="parse-button">Parse JSON</button>
        <button type="button" id="stringify-button">Stringify Updated Object</button>
      </div>
      <h3>Original JSON String</h3>
      <pre id="json-string" class="output"></pre>
      <h3>Parsed Object Summary</h3>
      <pre id="json-object" class="output"></pre>
      <h3>Updated JSON Output</h3>
      <pre id="json-output" class="output"></pre>
    </section>

    <section class="card">
      <p><a href="index.html">Back to Unit 8 index</a></p>
    </section>
  </main>
</body>
</html>
