<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 7 - Dungeon Challenge</title>
  <link rel="stylesheet" href="styles.css">
  <script src="dungeon.js" defer></script>
</head>
<body>
  <header>
    <h1>Challenge: Mini Dungeon Crawler</h1>
    <p>This extends the unit by using JavaScript and browser storage to track a simple player state.</p>
  </header>

  <main>
    <section class="card room-panel">
      <h2>Player</h2>
      <p id="player-stats" class="output"></p>
    </section>

    <section class="card room-panel">
      <h2>Current Room</h2>
      <div id="room-output" class="output"></div>
      <div class="button-row">
        <button type="button" id="next-room-button">Enter Next Room</button>
        <button type="button" id="reset-game-button">Restart Adventure</button>
      </div>
    </section>

    <section class="card">
      <p><a href="index.html">Back to Unit 7 index</a></p>
    </section>
  </main>
</body>
</html>
