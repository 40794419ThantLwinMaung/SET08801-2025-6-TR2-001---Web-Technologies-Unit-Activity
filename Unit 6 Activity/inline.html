<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 6 - Inline JavaScript</title>
</head>
<body>
  <h1>Unit 6: Inline JavaScript</h1>
  <p><a href="#" onclick="alert('Hello World'); return false;">Click Me (alert)</a></p>
  <p><a href="#" onclick="console.log('Hello World'); return false;">Click Me (console.log)</a></p>
  <p><a href="#" onmouseover="alert('Hello');">Hover over me (mouseover)</a></p>
  <p><a href="#" onmouseout="alert('Hello');">Move off me (mouseout)</a></p>
  <p>Open the browser console to see output from <code>console.log()</code>.</p>
</body>
</html>
